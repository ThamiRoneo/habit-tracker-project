<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="main-container">
        <section class="form-container">
            <h3>Add A New Habit</h3>
            <form>
                <label for="nameHabit">Name of a Habit:</label>
                <input type="text" name="nameHabit" id="nameHabit" placeholder="e.g. Football practice" required>
                <br>
                <label for="targetOfDays">Target of Days:</label>
                <input type="number" name="targetOfDays" value="1" min="1" max="7" id="targetOfDays"><br>

                <label for="category">Category:</label>
                <select name="category" id="category">
                    <option value="empty"></option>
                    <option value="health">Health</option>
                    <option value="fitness">Fitness</option>
                    <option value="study">Study</option>
                    <option value="personal">Personal</option>
                </select>
                <br>
                <p id="errorElement"></p><br>

                <div class="addHabitBtn">
                    <input type="submit" id="addHabitBtn" value="Add">
                </div>

            </form>
        </section>

        <section class="habitDisplay-container">
            <div class="habitDisplay-top">
                <h3>Habits List</h3>
                <hr>
            </div>

            <table>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Streak</th>
                    <th>Mark Done for Today</th>
                    <th>Delete</th>
                </tr>
            </table><br>

            <div class="stats-container">
                <div class="listStats">
                    <label for="totalHabits">Total Habits:</label>
                    <p id="totalHabits">0</p><br>
                    <label for="doneToday">Habits Done Today:</label>
                    <p id="doneToday">0</p><br>
                    <label for="completionPerc">Completion Percentage:</label>
                    <p id="completionPerc">0%</p>
                </div>
            </div>
        </section>
    </section>

    <script src="index.js"></script>
</body>

</html>
